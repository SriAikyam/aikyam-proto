# Lint proto files on every merge to main.
# Downstream services (feed-orchestrator, feed-generation, aikyam-kg) compile protos at build time
# from this repo — keeping main always lint-clean ensures a consistent contract baseline.

name: CI (main)

on:
  push:
    branches: [main]

concurrency:
  group: ci-main-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint proto files
        run: buf lint proto/
