syntax = "proto3";

package aikyam.injection.v1;

option java_multiple_files = true;
option java_package = "com.aikyam.proto.injection.v1";
option java_outer_classname = "InjectionProto";

service FeedInjectionService {
  rpc GetInjections(InjectionRequest) returns (InjectionResponse);
}

message InjectionRequest {
  string user_id     = 1;
  string feed_type   = 2;  // MAIN, TEMPLE, EXPLORE, VIDEO
  string user_role   = 3;  // devotee, priest, guest
  string cursor_type = 4;  // INITIAL, BOTTOM, TOP
}

message InjectionItem {
  string post_id       = 1;  // real postId (MONGODB_POST) or "injection:{type}:{date}" (MICROSERVICE/TEMPLATE)
  string content_type  = 2;  // PACHANG, EVENT, REMINDER, ANNOUNCEMENT
  int32  priority      = 3;  // higher = shown first
  map<string, string> metadata = 4;  // kept for extensibility
  string display_title = 5;  // empty = orchestrator must hydrate from DB (MONGODB_POST)
  string display_body  = 6;
  string media_key     = 7;  // R2 asset key — resolved by media service
  string entity_id     = 8;  // eventId / templeId — empty when not applicable
}

message InjectionResponse {
  repeated InjectionItem items = 1;
}
